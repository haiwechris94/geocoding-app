$kind: http-request
name: POST Geocode Single - Empty Body
method: POST
url: 'https://geocoding-app.onrender.com/api/geocoding/single'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: '{}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const status = pm.response.code;
      const body = pm.response.text();

      pm.test("Returns 400 for missing villageName (not 500)", () => {
        pm.expect(status).to.equal(400, `Expected 400 but got ${status}. Body: ${body}`);
      });

      pm.test("Response is valid JSON", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });

      if (status === 400) {
        pm.test("Error response has success: false", () => {
          const json = pm.response.json();
          pm.expect(json.success).to.equal(false);
        });

        pm.test("Error response contains error details", () => {
          const json = pm.response.json();
          pm.expect(json).to.satisfy(j => j.error || j.message, "Expected 'error' or 'message' field");
        });
      }

      console.log("Status:", status);
      console.log("Body:", body.substring(0, 500));
